<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Health Risk Detector</title>

<meta name="description" content="AI-powered health risk detection app.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">


<style>

/* Logout Button */

.logout-btn{
position:fixed;
top:20px;
right:20px;
background:#ef4444;
color:white;
padding:10px 16px;
border-radius:8px;
text-decoration:none;
font-weight:600;
z-index:9999;
}


/* Mobile fix for analyze button */

.bottom-action{
position:fixed;
bottom:15px;
left:0;
width:100%;
display:flex;
justify-content:center;
padding:0 20px;
z-index:1000;
}

.screen-content{
padding-bottom:120px;
}

#btn-analyze{
width:100%;
max-width:420px;
}

</style>

</head>


<body>


<a href="/logout" class="logout-btn">Logout</a>


<div class="app-container">


<!-- Welcome Screen -->

<section id="screen-welcome" class="screen active">

<div class="screen-content welcome-content">

<h1>AI Health Risk <span class="gradient-text">Detector</span></h1>

<p>Detect your health risk using AI symptom analysis</p>

<button class="btn btn-primary btn-glow" id="btn-start">

Start Symptom Check

</button>

</div>

</section>



<!-- Symptoms Screen -->

<section id="screen-symptoms" class="screen">

<div class="screen-content">

<div class="screen-header">

<button class="btn-back" id="btn-back-symptoms">←</button>

<div>

<h2>Select Your Symptoms</h2>

<p>Tap symptoms you feel</p>

</div>

</div>


<div class="symptom-counter">

<span id="symptom-count">0</span> symptoms selected

</div>


<div class="symptom-grid" id="symptom-grid">

</div>


<div class="bottom-action">

<button class="btn btn-primary btn-glow" id="btn-analyze" disabled>

Analyze Symptoms

</button>

</div>

</div>

</section>



<!-- Result Screen -->

<section id="screen-result" class="screen">

<div class="screen-content result-content">

<div class="screen-header">

<button class="btn-back" id="btn-back-result">←</button>

<div>

<h2>Risk Analysis</h2>

<p>AI health assessment</p>

</div>

</div>


<div class="result-card">

<h3>Risk Score: <span id="risk-score-number">0</span></h3>

<p id="risk-level-text">Low Risk</p>

</div>


<div class="bottom-action">

<button class="btn btn-primary btn-glow" id="btn-recommendation">

View Recommendations

</button>

</div>

</div>

</section>



<!-- Recommendation Screen -->

<section id="screen-recommendation" class="screen">

<div class="screen-content recommendation-content">

<div class="screen-header">

<button class="btn-back" id="btn-back-recommendation">←</button>

<div>

<h2>Recommendations</h2>

<p>AI medical guidance</p>

</div>

</div>


<div class="recommendation-card">

<p id="rec-card-text"></p>

<ul id="rec-tips"></ul>

</div>


<div class="recommendation-actions">

<button class="btn btn-call">

Call Doctor

</button>


<button class="btn btn-hospital">

Find Nearby Hospital

</button>

</div>


<button class="btn btn-restart" id="btn-restart">

Start New Check

</button>

</div>

</section>


</div>


<script src="{{ url_for('static', filename='script.js') }}"></script>

</body>
</html>
